services:
  web:
    build: .
    container_name: ru_manager_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./app:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: ru_manager_db
    environment:
      POSTGRES_DB: ru_manager
      POSTGRES_USER: ru_user
      POSTGRES_PASSWORD: ru_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  media_volume: